<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>STREAM CONTROL PANEL</title>
  <link rel="stylesheet" href="/style.css">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div class="page">
    <header>
      <h1>STREAM CONTROL PANEL</h1>
      <div class="right-head">
        <div id="dateBox" class="date-box">—</div>
        <div id="statusPill" class="status-pill danger">OFFLINE</div>
      </div>
    </header>

    <main class="grid">
      <section class="status card">
        <div class="row">
          <div class="sdi">
            <div class="label">SDI</div>
            <div id="sdiBadge" class="badge grey">UNKNOWN</div>
          </div>
          <div class="live">
            <div class="label">LIVE</div>
            <div id="liveBadge" class="badge grey">NO</div>
          </div>
          <div class="timer-wrap">
            <div class="label">UPTIME</div>
            <div id="timer" class="timer-box">00:00:00</div>
          </div>
        </div>
        <div class="meta-row">
          <div id="metaDevice" class="meta">Device: —</div>
          <div id="metaStreams" class="meta">Endpoints: —</div>
          <div id="metaStats" class="meta">FPS — | Bitrate — | Frames —</div>
        </div>
      </section>

      <section class="controls card">
        <div class="card-head">
          <h2>Output Targets</h2>
        </div>

        <div class="group">
          <h3>YouTube</h3>
          <label>YouTube RTMP/RTMPS URL</label>
          <input id="ytUrl" type="text" placeholder="rtmp://a.rtmp.youtube.com/live2">
          <label>YouTube Stream Key</label>
          <input id="ytKey" type="text" placeholder="xxxx-xxxx-xxxx-xxxx">
        </div>

        <div class="group">
          <h3>Facebook (optional)</h3>
          <label>Facebook RTMPS URL</label>
          <input id="fbUrl" type="text" placeholder="rtmps://live-api-s.facebook.com:443/rtmp">
          <label>Facebook Stream Key</label>
          <input id="fbKey" type="text" placeholder="copy from Facebook Live Producer">
        </div>

        <div class="row buttons">
          <button id="startStopBtn" class="primary">Start</button>
        </div>

        <div id="msg" class="msg"></div>
      </section>
    </main>

    <footer>
      <small>&copy; Stream Control • Ubuntu 24.04 + DeckLink Mini Recorder HD</small>
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
