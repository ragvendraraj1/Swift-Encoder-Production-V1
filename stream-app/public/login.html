<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — SWIFT RTMP ENCODER</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="login-body login-light">
  <div class="login-wrap">
    <div class="login-card">
      <h1 class="brand">SWIFT RTMP ENCODER</h1>
      <p class="subtitle">Sign in</p>

      <div id="err" class="msg err" style="display:none"></div>

      <form id="form" autocomplete="off">
        <label for="user">Username</label>
        <input id="user" type="text" placeholder="admin" autofocus>

        <label for="pass">Password</label>
        <input id="pass" type="password" placeholder="Enter password">

        <button class="btn-primary" type="submit">Login</button>
      </form>

      <div class="copyright">© SWIFT RTMP ENCODER</div>
    </div>
  </div>

  <script>
    const $ = s => document.querySelector(s);
    const err = $('#err');
    $('#form').addEventListener('submit', async (e) => {
      e.preventDefault();
      err.style.display = 'none';
      const r = await fetch('/auth/login', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          username: $('#user').value.trim(),
          password: $('#pass').value.trim()
        })
      });
      if (r.ok) location.href = '/';
      else {
        const j = await r.json().catch(()=>({}));
        err.textContent = j.error || 'Invalid username or password';
        err.style.display = 'block';
      }
    });
  </script>
</body>
</html>
